<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한땀한땀 카페 - 스마트 엑셀 주문 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Gaegu:wght@700&display=swap" rel="stylesheet">
    <!-- Chosen Palette: Warm Knitting Room (Cream, Latte Brown, Soft Terracotta) -->
    <style>
        body { font-family: 'Gowun Dodum', sans-serif; background-color: #FDFBF7; }
        .handwritten { font-family: 'Gaegu', cursive; }
        .chart-container { position: relative; width: 100%; max-width: 600px; margin-left: auto; margin-right: auto; height: 180px; max-height: 200px; }
        .btn-primary { transition: all 0.2s ease; background-color: #776B5D; color: white; }
        .btn-primary:hover { background-color: #5C4D43; transform: translateY(-1px); }
        .btn-secondary { background-color: #EBE3D5; color: #776B5D; }
        .btn-secondary:hover { background-color: #D2C4B7; }
        .order-item-enter { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="text-[#5C4D43] leading-relaxed">

    <!-- Application Structure Plan: 
        1. 브랜드 헤더: 따뜻한 카페 분위기 유지.
        2. 메뉴 선택 및 데이터 관리: 상단에 수동 메뉴 추가 기능과 엑셀 업로드/다운로드 버튼을 배치하여 대량 주문 대응.
        3. 실시간 영수증: 장바구니 리스트에 빨간색 '삭제' 버튼을 명확히 배치하여 개별 관리가 용이하도록 설계.
        4. 시각화: 현재 주문 구성의 가격대를 차트로 보여주어 전체 예산 가늠 보조.
    -->

    <!-- Visualization & Content Choices:
        - 엑셀 라이브러리: SheetJS(xlsx)를 로드하여 클라이언트 사이드에서 파일 읽기/쓰기 구현.
        - 장바구니 관리: JS 배열을 기반으로 하며, '삭제' 아이콘 클릭 시 splice를 통해 상태 업데이트 및 리렌더링.
        - 인터랙션: 파일 업로드 시 즉시 리스트가 갱신되며, 총액이 실시간 계산됨.
    -->

    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->

    <div class="max-w-6xl mx-auto px-4 py-12">
        <header class="text-center mb-12">
            <div class="inline-block px-4 py-1 bg-[#EBE3D5] text-[#776B5D] rounded-full text-xs font-bold mb-4 uppercase tracking-widest">🧶 Smart Data & Coffee</div>
            <h1 class="text-5xl font-bold handwritten text-[#776B5D] mb-4">포근한 한땀 데이터 주문서</h1>
            <p class="text-[#9F8C76]">엑셀 파일을 활용하여 단체 주문을 더 편리하게 관리하세요.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <!-- 왼쪽: 제어부 (7/12) -->
            <div class="lg:col-span-7 space-y-8">
                
                <!-- 엑셀 데이터 관리 섹션 -->
                <section class="bg-[#FAF6F0] rounded-3xl p-6 border-2 border-dashed border-[#D2C4B7] flex flex-wrap gap-4 items-center justify-between">
                    <div>
                        <h3 class="font-bold text-[#776B5D]">📊 엑셀 데이터 관리</h3>
                        <p class="text-xs text-[#9F8C76]">단위 주문을 파일로 불러오거나 내보낼 수 있습니다.</p>
                    </div>
                    <div class="flex gap-2">
                        <input type="file" id="excel-upload" accept=".xlsx, .xls, .csv" class="hidden" onchange="importExcel(event)">
                        <button onclick="document.getElementById('excel-upload').click()" class="btn-secondary px-4 py-2 rounded-xl text-xs font-bold">📂 파일 불러오기</button>
                        <button onclick="exportExcel()" class="bg-[#776B5D] text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-[#5C4D43]">💾 엑셀로 저장</button>
                    </div>
                </section>

                <section class="bg-white rounded-3xl p-8 shadow-sm border border-[#EBE3D5]">
                    <h2 class="text-xl font-bold text-[#776B5D] mb-6 flex items-center">
                        <span class="mr-2">☕</span> 수동 메뉴 추가
                    </h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                        <div class="md:col-span-2">
                            <label class="block text-xs font-bold text-[#9F8C76] mb-2 uppercase">Drink Select</label>
                            <select id="drink-select" class="w-full p-4 rounded-2xl bg-[#FAF6F0] border-none focus:ring-2 focus:ring-[#776B5D] cursor-pointer">
                                <option value="">음료를 선택해 주세요</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-[#9F8C76] mb-2 uppercase">Qty</label>
                            <input type="number" id="drink-qty" min="1" value="1" class="w-full p-4 rounded-2xl bg-[#FAF6F0] border-none focus:ring-2 focus:ring-[#776B5D] text-center">
                        </div>
                        <button onclick="addToCart('drink')" class="btn-primary w-full p-4 rounded-2xl font-bold">
                            추가
                        </button>
                    </div>
                </section>

                <section class="bg-white rounded-3xl p-8 border border-[#EBE3D5]">
                    <label for="user-request" class="block text-lg font-bold text-[#776B5D] mb-3 flex items-center">
                        <span class="mr-2">✍️</span> 전체 주문 요청 사항
                    </label>
                    <textarea id="user-request" oninput="renderCart()" placeholder="단체 주문 시 필요한 전달 사항을 적어주세요." class="w-full p-5 rounded-2xl bg-[#FAF6F0] border-none h-28 resize-none text-sm focus:ring-2 focus:ring-[#776B5D]"></textarea>
                </section>

                <div class="bg-white rounded-3xl p-6 border border-[#EBE3D5]">
                    <h3 class="text-[10px] font-bold text-[#9F8C76] mb-4 uppercase text-center tracking-widest">Order Distribution</h3>
                    <div class="chart-container">
                        <canvas id="priceChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 오른쪽: 영수증 (5/12) -->
            <div class="lg:col-span-5">
                <div class="bg-white rounded-3xl shadow-xl border border-[#EBE3D5] overflow-hidden sticky top-8">
                    <div class="h-3 bg-[#776B5D] w-full" style="mask-image: radial-gradient(circle, transparent 4px, black 5px); mask-size: 12px 12px;"></div>
                    
                    <div class="p-8">
                        <div class="text-center mb-8">
                            <h2 class="handwritten text-4xl text-[#776B5D]">최종 주문 확인서</h2>
                            <p class="text-[10px] text-[#9F8C76] mt-1 uppercase tracking-widest italic">Review your selections</p>
                        </div>

                        <div id="cart-list" class="space-y-4 mb-8 min-h-[300px] border-y border-dashed border-[#D2C4B7] py-6">
                            <p class="text-center text-gray-400 text-sm py-24 italic">장바구니가 비어 있습니다.</p>
                        </div>

                        <div class="flex justify-between items-center pt-2">
                            <span class="text-lg font-bold text-[#776B5D]">총 결제 예정 금액</span>
                            <span id="total-price" class="text-4xl font-black text-[#776B5D]">0원</span>
                        </div>

                        <button onclick="confirmOrder()" class="w-full mt-10 bg-[#776B5D] text-white py-5 rounded-2xl font-bold text-xl hover:bg-[#5C4D43] transition-all shadow-lg active:scale-[0.98]">
                            주문 확정하기
                        </button>
                        <button onclick="resetCart()" class="w-full mt-3 text-red-400 text-xs font-bold hover:underline">장바구니 전체 초기화</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const drinks = [
            { id: 1, name: "아메리카노", price: 4500 },
            { id: 2, name: "카페라떼", price: 5000 },
            { id: 3, name: "바닐라 라떼", price: 5500 },
            { id: 4, name: "제주 말차 라떼", price: 6000 },
            { id: 5, name: "수제 자몽 에이드", price: 6500 }
        ];

        let cart = [];
        let priceChart;

        function init() {
            const select = document.getElementById('drink-select');
            drinks.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d.id;
                opt.textContent = `${d.name} (${d.price.toLocaleString()}원)`;
                select.appendChild(opt);
            });
            initChart();
        }

        function initChart() {
            const ctx = document.getElementById('priceChart').getContext('2d');
            priceChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: '항목별 합계',
                        data: [],
                        backgroundColor: '#EBE3D5',
                        hoverBackgroundColor: '#776B5D',
                        borderRadius: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { display: false },
                        x: { grid: { display: false }, ticks: { color: '#9F8C76', font: { size: 9 } } }
                    }
                }
            });
        }

        function addToCart(type) {
            const drinkId = document.getElementById('drink-select').value;
            const qty = parseInt(document.getElementById('drink-qty').value);
            
            if (!drinkId) { alert('음료를 선택해 주세요!'); return; }
            if (qty < 1) return;

            const selected = drinks.find(d => d.id == drinkId);
            const existing = cart.find(item => item.id === selected.id);

            if (existing) {
                existing.qty += qty;
            } else {
                cart.push({ ...selected, qty });
            }
            renderCart();
        }

        function removeFromCart(index) {
            if(confirm('이 항목을 삭제하시겠습니까?')) {
                cart.splice(index, 1);
                renderCart();
            }
        }

        function resetCart() {
            if(confirm('장바구니를 비우시겠습니까?')) {
                cart = [];
                renderCart();
            }
        }

        function renderCart() {
            const listDiv = document.getElementById('cart-list');
            const totalSpan = document.getElementById('total-price');
            listDiv.innerHTML = '';
            let total = 0;

            if (cart.length === 0) {
                listDiv.innerHTML = '<p class="text-center text-gray-400 text-sm py-24 italic">장바구니가 비어 있습니다.</p>';
            } else {
                cart.forEach((item, index) => {
                    const itemTotal = item.price * item.qty;
                    total += itemTotal;
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'flex justify-between items-center text-sm order-item-enter bg-white p-3 rounded-xl border border-transparent hover:border-[#EBE3D5] transition-all';
                    itemDiv.innerHTML = `
                        <div class="flex-1">
                            <span class="font-bold text-[#776B5D]">${item.name}</span>
                            <span class="ml-2 text-xs text-gray-400 bg-[#FAF6F0] px-2 py-1 rounded-md">수량: ${item.qty}</span>
                        </div>
                        <div class="flex items-center space-x-4">
                            <span class="font-medium text-[#776B5D]">${itemTotal.toLocaleString()}원</span>
                            <button onclick="removeFromCart(${index})" class="w-8 h-8 rounded-full bg-red-50 text-red-400 hover:bg-red-400 hover:text-white transition-colors flex items-center justify-center font-bold">✕</button>
                        </div>
                    `;
                    listDiv.appendChild(itemDiv);
                });
            }

            totalSpan.innerText = total.toLocaleString() + '원';
            updateChart();
        }

        function updateChart() {
            priceChart.data.labels = cart.map(item => item.name);
            priceChart.data.datasets[0].data = cart.map(item => item.price * item.qty);
            priceChart.update();
        }

        // 엑셀 내보내기 기능
        function exportExcel() {
            if (cart.length === 0) { alert('내보낼 데이터가 없습니다.'); return; }
            
            const data = cart.map(item => ({
                "메뉴명": item.name,
                "단가": item.price,
                "수량": item.qty,
                "합계": item.price * item.qty
            }));

            const worksheet = XLSX.utils.json_to_sheet(data);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "OrderList");
            XLSX.writeFile(workbook, "한땀카페_주문내역.xlsx");
        }

        // 엑셀 불러오기 기능
        function importExcel(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const jsonData = XLSX.utils.sheet_to_json(worksheet);

                jsonData.forEach(row => {
                    const name = row["메뉴명"];
                    const qty = parseInt(row["수량"]) || 1;
                    const price = parseInt(row["단가"]) || 0;

                    if (name) {
                        const existing = cart.find(item => item.name === name);
                        if (existing) {
                            existing.qty += qty;
                        } else {
                            cart.push({ name, price, qty, id: Date.now() + Math.random() });
                        }
                    }
                });
                renderCart();
                alert('엑셀 데이터를 불러왔습니다.');
                event.target.value = ''; // 초기화
            };
            reader.readAsArrayBuffer(file);
        }

        function confirmOrder() {
            if (cart.length === 0) { alert('주문하실 메뉴를 먼저 담아주세요!'); return; }
            alert('주문이 성공적으로 전송되었습니다! 🧶');
            cart = [];
            document.getElementById('user-request').value = '';
            renderCart();
        }

        window.onload = init;
    </script>
</body>
</html>
